# ansible/06-kubelet/tasks/06-configuracao-crio.yml
---
- name: Configurar CRI-O para Kubernetes
  ansible.builtin.copy:
    dest: /etc/crio/crio.conf.d/10-kubernetes.conf
    content: |
      # Configurações para integração com Kubernetes

      [crio.runtime]
      cgroup_manager = "systemd"
      conmon = "/usr/libexec/crio/conmon"

      [crio.image]
      pause_image = "{{ node_images.pause }}"

      [crio.network]
      network_dir = "/etc/cni/net.d/"
      plugin_dirs = ["/opt/cni/bin/"]
    mode: "0644"
  notify: Reiniciar CRI-O

- name: Habilitar e iniciar CRI-O
  ansible.builtin.systemd:
    name: crio
    enabled: true
    state: started

- name: Aguardar CRI-O estar pronto
  ansible.builtin.wait_for:
    path: /var/run/crio/crio.sock
    timeout: 30
