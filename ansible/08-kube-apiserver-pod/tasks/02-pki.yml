# ansible/08-kube-apiserver-pod/tasks/02-pki.yml
---
- name: Criar estrutura de subdiretórios de PKI do kube-apiserver
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop:
    - /etc/kubernetes/conf/kube-apiserver/pki/ca
    - /etc/kubernetes/conf/kube-apiserver/pki/etcd
    - /etc/kubernetes/conf/kube-apiserver/pki/kubelet
    - /etc/kubernetes/conf/kube-apiserver/pki/front-proxy
    - /etc/kubernetes/conf/kube-apiserver/pki/sa
    - /etc/kubernetes/conf/kube-apiserver/pki/apiserver

# CA do Kubernetes (--client-ca-file e --kubelet-certificate-authority)
- name: Copiar CA do Kubernetes
  ansible.builtin.copy:
    src: "{{ pki_cas.kubernetes.path_cert }}"
    dest: "/etc/kubernetes/conf/kube-apiserver/pki/ca/{{ pki_cas.kubernetes.path_cert | basename }}"
    owner: root
    group: root
    mode: "0644"

# CA do Etcd (--etcd-cafile)
- name: Copiar CA do Etcd
  ansible.builtin.copy:
    src: "{{ pki_cas.etcd.path_cert }}"
    dest: "/etc/kubernetes/conf/kube-apiserver/pki/etcd/{{ pki_cas.etcd.path_cert | basename }}"
    owner: root
    group: root
    mode: "0644"

# CA do Front Proxy (--requestheader-client-ca-file)
- name: Copiar CA do Front Proxy
  ansible.builtin.copy:
    src: "{{ pki_cas.front_proxy.path_cert }}"
    dest: "/etc/kubernetes/conf/kube-apiserver/pki/front-proxy/{{ pki_cas.front_proxy.path_cert | basename }}"
    owner: root
    group: root
    mode: "0644"

# Certificado cliente apiserver→etcd (--etcd-certfile / --etcd-keyfile)
- name: Copiar certificados cliente apiserver→etcd
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - src: "{{ pki_certs.kube_apiserver_etcd_cli.path_cert }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/etcd/{{ pki_certs.kube_apiserver_etcd_cli.path_cert | basename }}"
      mode: "0644"
    - src: "{{ pki_certs.kube_apiserver_etcd_cli.path_chave }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/etcd/{{ pki_certs.kube_apiserver_etcd_cli.path_chave | basename }}"
      mode: "0640"
  loop_control:
    label: "{{ item.dest }}"

# Certificado cliente apiserver→kubelet (--kubelet-client-certificate / --kubelet-client-key)
- name: Copiar certificados cliente apiserver→kubelet
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - src: "{{ pki_certs.kube_apiserver_kubelet_cli.path_cert }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/kubelet/{{ pki_certs.kube_apiserver_kubelet_cli.path_cert | basename }}"
      mode: "0644"
    - src: "{{ pki_certs.kube_apiserver_kubelet_cli.path_chave }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/kubelet/{{ pki_certs.kube_apiserver_kubelet_cli.path_chave | basename }}"
      mode: "0640"
  loop_control:
    label: "{{ item.dest }}"

# Certificado cliente front-proxy (--proxy-client-cert-file / --proxy-client-key-file)
- name: Copiar certificados cliente front-proxy
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - src: "{{ pki_certs.kube_front_proxy_cli.path_cert }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/front-proxy/{{ pki_certs.kube_front_proxy_cli.path_cert | basename }}"
      mode: "0644"
    - src: "{{ pki_certs.kube_front_proxy_cli.path_chave }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/front-proxy/{{ pki_certs.kube_front_proxy_cli.path_chave | basename }}"
      mode: "0640"
  loop_control:
    label: "{{ item.dest }}"

# Chaves de Service Account (--service-account-key-file / --service-account-signing-key-file)
- name: Copiar chaves de Service Account
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - src: "{{ pki_certs.service_account.path_cert }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/sa/{{ pki_certs.service_account.path_cert | basename }}"
      mode: "0644"
    - src: "{{ pki_certs.service_account.path_chave }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/sa/{{ pki_certs.service_account.path_chave | basename }}"
      mode: "0640"
  loop_control:
    label: "{{ item.dest }}"

# TLS do servidor (--tls-cert-file / --tls-private-key-file) — específico por nó
- name: Copiar certificado TLS do kube-apiserver (específico do nó)
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - src: "{{ pki_certs.kube_apiserver.path_cert | format(inventory_hostname) }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/apiserver/{{ pki_certs.kube_apiserver.path_cert | format(inventory_hostname) | basename }}"
      mode: "0644"
    - src: "{{ pki_certs.kube_apiserver.path_chave | format(inventory_hostname) }}"
      dest: "/etc/kubernetes/conf/kube-apiserver/pki/apiserver/{{ pki_certs.kube_apiserver.path_chave | format(inventory_hostname) | basename }}"
      mode: "0640"
  loop_control:
    label: "{{ item.dest }}"
