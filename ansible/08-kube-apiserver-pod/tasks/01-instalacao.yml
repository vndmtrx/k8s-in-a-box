# ansible/08-kube-apiserver-pod/tasks/01-instalacao.yml
---
- name: Garantir diretório de configuração isolado do kube-apiserver
  ansible.builtin.file:
    path: /etc/kubernetes/conf/kube-apiserver
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Garantir diretório de manifestos do Kubernetes
  ansible.builtin.file:
    path: /etc/kubernetes/manifests
    state: directory
    owner: root
    group: root
    mode: "0755"
