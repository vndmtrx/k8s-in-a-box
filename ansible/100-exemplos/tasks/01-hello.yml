# ansible/100-exemplos/tasks/01-hello.yml
---
- name: Garantir diretório exemplos/hello na home do usuário do ansible
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/exemplos/hello/"
    state: directory
    mode: "0755"

- name: Copiar exemplo hello completo para a pasta de exemplos
  ansible.builtin.copy:
    src: "hello/"
    dest: "/home/{{ ansible_user }}/exemplos/hello/"
    mode: "0644"
  register: hello_copy

- name: Aplicar Manifests do Hello
  ansible.builtin.command:
    cmd: "kubectl apply -f /home/{{ ansible_user }}/exemplos/hello/"
  register: hello_apply
  changed_when: "'configured' in hello_apply.stdout or 'created' in hello_apply.stdout"

- name: Reiniciar deployment/hello-app se houver alterações
  ansible.builtin.command:
    cmd: "kubectl rollout restart deployment/hello-app -n exemplos"
  when: hello_copy.changed or hello_apply.changed
  changed_when: true

- name: Aguardar rollout do Hello ser concluído
  ansible.builtin.command:
    cmd: "kubectl rollout status deployment/hello-app -n exemplos --timeout=120s"
  changed_when: false
