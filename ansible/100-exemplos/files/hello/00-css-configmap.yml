apiVersion: v1
kind: ConfigMap
metadata:
  name: exemplos-css
  namespace: exemplos
  labels:
    app: exemplos-comum
data:
  base.css: |
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1.25rem 1rem;
      box-sizing: border-box;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 0.2rem;
    }

    h1 {
      font-size: 2.2rem;
      margin-top: 0.5rem;
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }

    p {
      font-size: 0.95rem;
      max-width: 700px;
      margin: 0 auto 0.75rem auto;
      line-height: 1.4;
      text-align: center;
      word-spacing: 0.05em;
    }

    /* Blocos principais (glassmorphism dashboard) */
    .dashboard {
      background-color: rgba(30, 41, 59, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      max-width: 1100px;
      width: 100%;
      margin: 1.25rem auto;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      box-sizing: border-box;
    }

    .dashboard p.intro {
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
      color: #cbd5e1;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    a:hover {
      color: #7dd3fc;
      text-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    /* Elementos do Form/Inputs */
    input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background-color: rgba(15, 23, 42, 0.6);
      color: #f1f5f9;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }

    /* Botões */
    .btn {
      display: inline-block;
      text-align: center;
      background: #0284c7;
      color: #fff !important;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
      box-sizing: border-box;
      text-decoration: none;
    }

    .btn:hover {
      background: #0369a1;
      color: #fff !important;
      text-shadow: none;
    }

    /* Services Grid & Cards */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
      margin-top: 1rem;
      text-align: left;
    }

    .service-card {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .service-card h3 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1.05rem;
      color: #f1f5f9;
    }

    .service-card p {
      font-size: 0.82rem;
      color: #94a3b8;
      margin: 0 0 1.25rem 0;
      text-align: left;
    }

    .service-card pre {
      margin: 0 0 1.25rem 0;
      font-size: 0.72rem;
      padding: 0.4rem 0.6rem;
      background: #020617;
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      overflow-x: auto;
      font-family: "Fira Code", "Courier New", monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .service-card pre.copiavel,
    .service-card pre .copiavel {
      user-select: all;
      -webkit-user-select: all;
      cursor: pointer;
    }

    .service-card .token-help {
      margin-top: auto;
      margin-bottom: 0.25rem;
      font-size: 0.72rem;
      color: #64748b;
    }

    /* Badges & Repo */
    .repo, .badges {
      margin-top: 0.8rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .repo span {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
      opacity: 0.9;
    }

    .repo img, .badges img {
      height: 20px;
      vertical-align: middle;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
        min-height: auto;
      }
      .dashboard {
        padding: 1.25rem 1.5rem;
      }
    }
