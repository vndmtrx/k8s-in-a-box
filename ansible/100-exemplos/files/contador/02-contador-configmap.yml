apiVersion: v1
kind: ConfigMap
metadata:
  name: contador-pagina
  namespace: exemplos
  labels:
    app: contador-app
data:
  index.php: |
    <?php
    $baseDir = '/dados';
    $arquivoContador = "$baseDir/contador.txt";
    $arquivoUltimo = "$baseDir/ultimo.txt";
    $arquivoCron = "$baseDir/cron.txt";

    if (!file_exists($baseDir)) {
      mkdir($baseDir, 0777, true);
    }

    // Define timezone local (São Paulo)
    date_default_timezone_set('America/Sao_Paulo');

    // Lê valores anteriores (se existirem)
    if (file_exists($arquivoContador)) {
      $contador = (int) file_get_contents($arquivoContador);
    } else {
      $contador = 0;
    }

    if (file_exists($arquivoUltimo)) {
      $dataHora = trim(file_get_contents($arquivoUltimo));
    } else {
      $dataHora = "primeiro acesso";
    }

    if (file_exists($arquivoCron)) {
      $cronData = trim(file_get_contents($arquivoCron));
    } else {
      $cronData = "cron job ainda não executou";
    }

    // Filtra requisições de saúde do Kubernetes (kube-probe) para não poluir o contador
    $isProbe = isset($_SERVER['HTTP_USER_AGENT']) && stripos($_SERVER['HTTP_USER_AGENT'], 'kube-probe') !== false;

    if (!$isProbe) {
      $contador++;
      file_put_contents($arquivoContador, $contador);

      $novaData = date('d/m/Y H:i:s');
      file_put_contents($arquivoUltimo, $novaData);
    }
    ?>
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Contador de Acessos - Kubernetes in a Box</title>
    <style>
        body {
          margin: 0;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
          color: #f1f5f9;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          text-align: center;
          padding: 1.25rem 1rem;
          box-sizing: border-box;
        }

        .icon {
          font-size: 3rem;
          margin-bottom: 0.2rem;
        }

        h1 {
          font-size: 2.2rem;
          margin-top: 0.5rem;
          margin-bottom: 0.4rem;
          line-height: 1.2;
        }

        p {
          font-size: 0.95rem;
          max-width: 700px;
          margin: 0 auto 0.75rem auto;
          line-height: 1.4;
          text-align: center;
          word-spacing: 0.05em;
        }

        /* blocos principais (dashboard / contador) */
        .contador {
          background-color: rgba(30, 41, 59, 0.65);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 12px;
          padding: 1.5rem 2rem;
          max-width: 600px;
          width: 100%;
          margin: 1.25rem auto;
          box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
          box-sizing: border-box;
        }

        .contador p {
          margin-bottom: 0.8rem;
        }

        a {
          color: #38bdf8;
          text-decoration: none;
          font-weight: 600;
          transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        a:hover {
          color: #7dd3fc;
          text-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
        }

        footer {
          margin-top: 1.5rem;
          font-size: 0.85rem;
          opacity: 0.9;
        }

        .repo,
        .badges {
          margin-top: 0.8rem;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 6px;
        }

        .repo span {
          display: block;
          font-size: 0.85rem;
          margin-bottom: 0.2rem;
          opacity: 0.9;
        }

        .repo img,
        .badges img {
          height: 20px;
          vertical-align: middle;
        }

        @media (max-width: 768px) {
          body {
            padding: 1rem;
            min-height: auto;
          }
          .contador {
            padding: 1.25rem 1.5rem;
          }
        }
      </style>
    </head>
    <body>
      <div class="icon">📈</div>
      <h1>Contador de Acessos</h1>

      <div class="contador">
        <p><strong>Total de acessos:</strong> <?= $contador ?></p>
        <p><strong>&Uacute;ltimo acesso:</strong> <?= htmlspecialchars($dataHora) ?></p>
        <p><strong>&Uacute;ltimo CronJob:</strong> <?= htmlspecialchars($cronData) ?></p>
        <p><strong><a href="/">Voltar &agrave; p&aacute;gina inicial</a></strong></a>
      </div>

      <footer>
        <p>Dados persistidos em Volume Din&acirc;mico</p>
      </footer>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: contador-apache-config
  namespace: exemplos
  labels:
    app: contador-app
data:
  ports.conf: |
    # Mapeado para 8080 (rootless)
    Listen 8080

    <IfModule ssl_module>
            Listen 8443
    </IfModule>

    <IfModule mod_gnutls.c>
            Listen 8443
    </IfModule>

  000-default.conf: |
    <VirtualHost *:8080>
            ServerAdmin webmaster@localhost
            DocumentRoot /var/www/html

            # Envia os logs para as saídas padrão do container
            ErrorLog /dev/stderr
            CustomLog /dev/stdout combined
    </VirtualHost>
