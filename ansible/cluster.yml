# ansible/cluster.yml
---
- name: Tarefas a serem executadas no host
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  roles:
    - role: infra-artefatos
      tags:
        - cluster-artefatos
        - cluster

- name: Criação local dos CAs e certificados do projeto
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  roles:
    - role: infra-pki
      tags:
        - cluster-pki
        - cluster

- name: Configurações base para todas as máquinas
  hosts:
    - todos
  become: true
  gather_facts: false
  roles:
    - role: infra-sistema
      tags:
        - cluster-sistema
        - cluster

- name: Configurações do Balanceador de carga
  hosts: loadbalancers
  become: true
  gather_facts: false
  roles:
    - role: infra-balanceador
      tags:
        - cluster-balanceador
        - cluster

- name: Configurações do NFS
  hosts: nfs
  become: true
  gather_facts: false
  roles:
    - role: infra-nfs
      tags:
        - cluster-nfs
        - cluster

- name: Configurações comuns a todos os nós
  hosts: cluster
  become: true
  gather_facts: false
  roles:
    - role: k8s-cluster-base
      tags:
        - cluster-kubernetes-base
        - cluster

- name: Configuração do kubelet
  hosts: cluster
  become: true
  gather_facts: false
  serial: 1
  roles:
    - role: k8s-kubelet
      tags:
        - cluster-kubelet
        - cluster

- name: Configurações do cluster Etcd
  hosts: managers
  become: true
  gather_facts: false
  roles:
    - role: k8s-etcd-pod
      tags:
        - cluster-etcd-pod
        - cluster-etcd
        - cluster

- name: Configuração do kube-apiserver (Static Pod)
  hosts: managers
  become: true
  gather_facts: false
  roles:
    - role: k8s-apiserver-pod
      tags:
        - cluster-kube-apiserver-pod
        - cluster-kube-apiserver
        - cluster

- name: Configuração do kube-controller-manager (Static Pod)
  hosts: managers
  become: true
  gather_facts: false
  roles:
    - role: k8s-controller-manager-pod
      tags:
        - cluster-kube-controller-manager-pod
        - cluster-kube-controller-manager
        - cluster

- name: Configuração do kube-scheduler (Static Pod)
  hosts: managers
  become: true
  gather_facts: false
  roles:
    - role: k8s-scheduler-pod
      tags:
        - cluster-kube-scheduler-pod
        - cluster-kube-scheduler
        - cluster
