apiVersion: v1
kind: ConfigMap
metadata:
  name: contador-pagina
  namespace: exemplos
  labels:
    app: contador-app
data:
  index.php: |
    <?php
    $baseDir = '/dados';
    $arquivoContador = "$baseDir/contador.txt";
    $arquivoUltimo = "$baseDir/ultimo.txt";
    $arquivoCron = "$baseDir/cron.txt";

    if (!file_exists($baseDir)) {
      mkdir($baseDir, 0777, true);
    }

    // Define timezone local (São Paulo)
    date_default_timezone_set('America/Sao_Paulo');

    // Lê valores anteriores (se existirem)
    if (file_exists($arquivoContador)) {
      $contador = (int) file_get_contents($arquivoContador);
    } else {
      $contador = 0;
    }

    if (file_exists($arquivoUltimo)) {
      $dataHora = trim(file_get_contents($arquivoUltimo));
    } else {
      $dataHora = "primeiro acesso";
    }

    if (file_exists($arquivoCron)) {
      $cronData = trim(file_get_contents($arquivoCron));
    } else {
      $cronData = "cron job ainda não executou";
    }

    // Filtra requisições de saúde do Kubernetes (kube-probe) para não poluir o contador
    $isProbe = isset($_SERVER['HTTP_USER_AGENT']) && stripos($_SERVER['HTTP_USER_AGENT'], 'kube-probe') !== false;

    if (!$isProbe) {
      $contador++;
      file_put_contents($arquivoContador, $contador);

      $novaData = date('d/m/Y H:i:s');
      file_put_contents($arquivoUltimo, $novaData);
    }
    ?>
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Contador de Acessos - Kubernetes in a Box</title>
      <link rel="stylesheet" href="base.css">
    </head>
    <body>
      <div class="icon">📈</div>
      <h1>Contador de Acessos</h1>
      <p>Estatísticas de utilização e persistência de dados no cluster.</p>

      <div class="dashboard">
        <div class="services-grid">
          <div class="service-card">
            <h3>Total de Acessos</h3>
            <p>Quantidade acumulada de visitas nesta página.</p>
            <pre><?= $contador ?></pre>
          </div>

          <div class="service-card">
            <h3>Último Acesso</h3>
            <p>Data e hora do último acesso registrado no volume.</p>
            <pre><?= htmlspecialchars($dataHora) ?></pre>
          </div>

          <div class="service-card">
            <h3>Último CronJob</h3>
            <p>Data e hora da última execução do Job agendado.</p>
            <pre><?= htmlspecialchars($cronData) ?></pre>
          </div>
        </div>

        <div style="margin-top: 1.5rem; text-align: center;">
          <a href="/" class="btn" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">Voltar à Página Inicial</a>
        </div>
      </div>

      <footer>
        <p>Dados persistidos em Volume Dinâmico (NFS Provisioner)</p>
      </footer>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: contador-apache-config
  namespace: exemplos
  labels:
    app: contador-app
data:
  ports.conf: |
    # Mapeado para 8080 (rootless)
    Listen 8080

    <IfModule ssl_module>
            Listen 8443
    </IfModule>

    <IfModule mod_gnutls.c>
            Listen 8443
    </IfModule>

  000-default.conf: |
    <VirtualHost *:8080>
            ServerAdmin webmaster@localhost
            DocumentRoot /var/www/html

            # Envia os logs para as saídas padrão do container
            ErrorLog /dev/stderr
            CustomLog /dev/stdout combined
    </VirtualHost>
