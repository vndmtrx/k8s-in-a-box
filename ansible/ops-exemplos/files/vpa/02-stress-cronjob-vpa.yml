# ansible/100-exemplos/files/vpa/02-vpa-stress-cronjob-vpa.yml
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-stress-cronjob-vpa
  namespace: exemplos
spec:
  targetRef:
    apiVersion: batch/v1
    kind: CronJob
    name: vpa-stress-cronjob
  updatePolicy:
    updateMode: "Initial"
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        controlledValues: RequestsOnly
        minAllowed:
          cpu: "10m"
          memory: "32Mi"
        maxAllowed:
          cpu: "500m"
          memory: "128Mi"
