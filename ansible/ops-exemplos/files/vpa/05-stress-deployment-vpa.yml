# ansible/100-exemplos/files/vpa/05-vpa-stress-deployment-vpa.yml
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-stress-deployment-vpa
  namespace: exemplos
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpa-stress-deployment
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          cpu: "10m"
          memory: "32Mi"
        maxAllowed:
          cpu: "500m"
          memory: "256Mi"
