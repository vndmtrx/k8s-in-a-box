# ansible/100-exemplos/tasks/02-contador.yml
---
- name: Garantir diretório exemplos/contador na home do usuário do ansible
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/exemplos/contador/"
    state: directory
    mode: "0755"

- name: Copiar exemplo contador completo para a pasta de exemplos
  ansible.builtin.copy:
    src: "contador/"
    dest: "/home/{{ ansible_user }}/exemplos/contador/"
    mode: "0644"
  register: contador_copy

- name: Aplicar Manifests do Contador
  ansible.builtin.command:
    cmd: "kubectl apply -f /home/{{ ansible_user }}/exemplos/contador/"
  register: contador_apply
  changed_when: "'configured' in contador_apply.stdout or 'created' in contador_apply.stdout"

- name: Reiniciar deployment/contador se houver alterações
  ansible.builtin.command:
    cmd: "kubectl rollout restart deployment/contador -n exemplos"
  when: contador_copy.changed or contador_apply.changed
  changed_when: true

- name: Aguardar rollout do Contador ser concluído
  ansible.builtin.command:
    cmd: "kubectl rollout status deployment/contador -n exemplos --timeout=120s"
  changed_when: false
