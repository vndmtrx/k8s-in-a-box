# ansible/13-addons-cluster/tasks/10-prometheus-stack.yml
---
- name: Adicionar repositório helm do Prometheus Community
  ansible.builtin.command:
    cmd: "helm repo add prometheus-community https://prometheus-community.github.io/helm-charts"
  register: resultado_repo_add
  changed_when: "'already exists' not in resultado_repo_add.stdout"

- name: Atualizar repositórios helm
  ansible.builtin.command:
    cmd: "helm repo update"
  changed_when: false

- name: Garantir diretório charts na home do usuário do ansible
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/charts"
    state: directory
    mode: "0755"

- name: Criar arquivo de configuração Helm para o Prometheus Stack
  ansible.builtin.template:
    src: prometheus-stack-helm-config.yml.j2
    dest: "/home/{{ ansible_user }}/charts/prometheus-stack-helm-config.yml"
    mode: "0644"

- name: Instalar chart do kube-prometheus-stack
  ansible.builtin.command:
    cmd: >
      helm upgrade --install prometheus-stack prometheus-community/kube-prometheus-stack
      --namespace monitoring
      --create-namespace
      --values /home/{{ ansible_user }}/charts/prometheus-stack-helm-config.yml
      --atomic --wait --timeout 600s
  register: resultado_helm_upgrade
  changed_when: "'installed' in resultado_helm_upgrade.stdout or 'upgraded' in resultado_helm_upgrade.stdout"
